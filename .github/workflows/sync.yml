name: Zoho Attendance Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Get Zoho Access Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.in/oauth/v2/token" \
            -d "refresh_token=${{ secrets.ZOHO_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            -d "grant_type=refresh_token")
          echo "Token Response: $RESPONSE"
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Trigger Zoho Creator Form
        run: |
          RESULT=$(curl -s -X POST \
            "https://creator.zoho.in/api/v2/yuganmedicalindustriesprivat/attendance-sync-system/form/Trigger_API" \
            -H "Authorization: Zoho-oauthtoken ${{ steps.get_token.outputs.ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"data": {"Trigger": "run"}}')
          echo "Submit Result: $RESULT"
